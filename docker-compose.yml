version: '3.8'
services:
  qa_portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: qa_portal
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    container_name: qa_portal_backend
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=shyam6132
      - POSTGRES_DB=qa_database

  pgadmin:
    image: dpage/pgadmin4
    container_name: qa-pgadmin
    depends_on:
      - db
    ports:
      - "5051:80"
    environment:
        PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
        PGADMIN_DEFAULT_PASSWORD: root
    restart: always

volumes:
  postgres_data: